<!DOCTYPE html>
<html lang="es-CR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- Security Headers (meta fallbacks — configure server headers for production) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <!-- SEO + PWA meta -->
  <title>Mi Manual ALM by NelSystems</title>
  <meta name="description" content="Manual completo de Jefatura de Almacén Local de Medicamentos CCSS — SAP ERP Módulo MM + SIGES/SIFA. 6 fases, 26 semanas.">
  <meta name="author" content="Manuales CCSS - El 
    Toka — NelSystems">
  <meta name="theme-color" content="#006B8F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Manual ALM">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Mi Manual ALM">
  <meta name="color-scheme" content="dark">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Mi Manual ALM by NelSystems">
  <meta property="og:description" content="Manual de aprendizaje para Jefatura de Almacén Local de Medicamentos — CCSS">
  <meta property="og:image" content="icons/icon-512.png">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <!-- ── SIDEBAR OVERLAY (mobile) ── -->
  <div id="sidebar-overlay" aria-hidden="true"></div>

  <!-- ── APP SHELL ── -->
  <div id="app">

    <!-- ── TOPBAR ── -->
    <header id="topbar" role="banner">
      <!-- Brand -->
      <div class="brand" id="brand-home" role="button" tabindex="0" aria-label="Ir al inicio" title="Mi Manual ALM — Inicio">
        <img src="icons/icon-512.png" alt="NelSystems logo" width="36" height="36" loading="eager">
        <div class="brand-text">
          <span class="brand-name">Mi Manual ALM</span>
          <span class="brand-sub">by NelSystems</span>
        </div>
      </div>

      <!-- Search -->
      <div id="search-wrapper" role="search">
        <span class="search-icon" aria-hidden="true">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input
          id="search-input"
          type="search"
          placeholder="Buscar en el manual…  (Ctrl+K)"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Buscar en el manual"
          maxlength="120"
        >
        <button id="search-clear" aria-label="Limpiar búsqueda" title="Limpiar">×</button>
        <div id="search-results" role="listbox" aria-label="Resultados de búsqueda"></div>
      </div>

      <!-- Actions -->
      <div class="topbar-actions">
        <div id="offline-badge" role="status" aria-live="polite" title="Sin conexión — funcionando en modo offline">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.56 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
          Offline
        </div>
        <button id="install-btn" aria-label="Instalar aplicación" title="Instalar Mi Manual ALM">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Instalar
        </button>
        <button id="menu-toggle" aria-label="Abrir menú" aria-expanded="false" title="Menú">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- ── SIDEBAR ── -->
    <nav id="sidebar" role="navigation" aria-label="Navegación del manual">

      <!-- Phases nav -->
      <div class="sidebar-section">
        <div class="sidebar-label">Plan de Aprendizaje</div>
        <div id="phase-nav"></div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Progress -->
      <div class="sidebar-progress">
        <div class="progress-label">
          <span style="font-size:0.72rem;color:var(--text-muted)">Progreso total</span>
          <span id="global-progress-txt" style="font-size:0.72rem;color:var(--text-muted)"></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="global-progress-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Utils -->
      <div class="sidebar-section">
        <div class="sidebar-label">Utilidades</div>
        <div class="sidebar-util" onclick="navigate('home')" role="button" tabindex="0">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Inicio
        </div>
        <div class="sidebar-util" onclick="window.print()" role="button" tabindex="0" title="Imprimir sección actual">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Imprimir
        </div>
        <div class="sidebar-util" onclick="resetProgress()" role="button" tabindex="0" title="Reiniciar listas de verificación">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.65"/></svg>
          Reiniciar progreso
        </div>
      </div>

      <div class="sidebar-divider"></div>

      <!-- Keyboard shortcuts hint -->
      <div style="padding:10px 20px">
        <div style="font-size:0.68rem;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.08em">Atajos</div>
        <div style="display:flex;flex-direction:column;gap:4px">
          <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-muted)">
            <span>Buscar</span>
            <kbd style="background:var(--bg-elevated);padding:1px 6px;border-radius:3px;font-family:var(--font-mono);font-size:0.65rem;border:1px solid var(--border)">Ctrl+K</kbd>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text-muted)">
            <span>Volver al inicio</span>
            <kbd style="background:var(--bg-elevated);padding:1px 6px;border-radius:3px;font-family:var(--font-mono);font-size:0.65rem;border:1px solid var(--border)">Esc</kbd>
          </div>
        </div>
      </div>

      <!-- Footer brand -->
      <div style="padding:16px 20px 8px;margin-top:auto">
        <div style="display:flex;align-items:center;gap:8px">
          <img src="icons/icon-64.png" alt="" width="24" height="24" style="border-radius:5px;opacity:0.7">
          <div>
            <div style="font-size:0.68rem;font-weight:700;color:var(--text-muted);font-family:var(--font-display)">NelSystems</div>
            <div style="font-size:0.62rem;color:var(--text-muted)">ALM Manual v1.0 · 2025</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- ── MAIN CONTENT ── -->
    <main id="main" role="main" aria-label="Contenido principal" tabindex="-1">
      <!-- Rendered dynamically by app.js -->
      <div class="empty-state">
        <div class="es-icon spin">⚙️</div>
        <h3>Cargando manual…</h3>
        <p>Por favor espera un momento.</p>
      </div>
    </main>

  </div><!-- /#app -->

  <!-- ── BACK TO TOP ── -->
  <button id="back-top" aria-label="Volver al inicio de la página" title="Subir al tope">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- ── TOAST ── -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- ── SCRIPTS (deferred) ── -->
  <script src="js/data.js" defer></script>
  <script src="js/app.js" defer></script>

  <!-- Expose resetProgress to sidebar util -->
  <script>
    function resetProgress() {
      if (!confirm('¿Deseas reiniciar todo el progreso de las listas de verificación?')) return;
      try { localStorage.removeItem('alm_progress_v1'); } catch(e){}
      location.reload();
    }
  </script>
</body>
</html>
